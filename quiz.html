<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizVibe — Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--text:#f0eeff;--muted:#7b7a8e;--border:rgba(255,255,255,0.07)}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;cursor:none}
    .cursor{width:12px;height:12px;background:#fff;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:difference;transition:transform 0.1s}
    .cursor-follower{width:36px;height:36px;border:1.5px solid rgba(255,255,255,0.3);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:all 0.12s ease;mix-blend-mode:difference}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:60px 60px;z-index:0}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.1;animation:float 12s ease-in-out infinite;z-index:0;pointer-events:none}
    .orb-1{width:400px;height:400px;background:#c44dff;top:-100px;left:-100px}
    .orb-2{width:300px;height:300px;background:#4361ee;bottom:-100px;right:-100px;animation-delay:-4s}
    @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}
    #confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:2}
    .container{max-width:680px;margin:0 auto;padding:2rem;position:relative;z-index:3}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,#fff,#c44dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .back-link{color:var(--muted);font-size:0.85rem;text-decoration:none;transition:color 0.2s ease;cursor:none}
    .back-link:hover{color:var(--text)}
    .score-hero{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;text-align:center;margin-bottom:1.5rem;animation:fadeUp 0.6s ease both;position:relative;overflow:hidden}
    .result-emoji{font-size:3.5rem;display:block;margin-bottom:1rem;animation:bounce 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s both}
    @keyframes bounce{from{opacity:0;transform:scale(0) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
    .result-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;letter-spacing:-1px;margin-bottom:0.5rem;animation:fadeUp 0.6s ease 0.4s both}
    .result-msg{color:var(--muted);font-size:0.95rem;max-width:380px;margin:0 auto 2rem;line-height:1.6;animation:fadeUp 0.6s ease 0.5s both}
    .score-ring-wrap{display:flex;justify-content:center;margin-bottom:2rem;animation:fadeUp 0.6s ease 0.6s both}
    .score-ring{position:relative;width:130px;height:130px}
    .score-ring svg{transform:rotate(-90deg)}
    .score-ring circle{fill:none;stroke-width:5;stroke-linecap:round}
    .ring-bg-r{stroke:var(--border)}
    .ring-fg-r{stroke-dasharray:345;stroke-dashoffset:345;transition:stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1) 0.8s}
    .score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .score-pts{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1px;line-height:1}
    .score-sub{color:var(--muted);font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;margin-top:0.2rem}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;animation:fadeUp 0.6s ease 0.7s both}
    .stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:1rem;text-align:center;transition:all 0.3s ease}
    .stat-box:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.15)}
    .stat-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-1px;display:block;margin-bottom:0.2rem}
    .stat-lbl{color:var(--muted);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px}
    .section-title{font-family:'Syne',sans-serif;font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:1.5rem 0 1rem;font-weight:600;animation:fadeUp 0.6s ease 0.8s both}
    .recs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.9rem;margin-bottom:1.5rem}
    .rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.2rem;text-decoration:none;color:var(--text);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);cursor:none;display:block;animation:fadeUp 0.6s ease both}
    .rec-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,0.3)}
    .rec-emoji{font-size:1.8rem;display:block;margin-bottom:0.5rem}
    .rec-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:0.2rem}
    .rec-desc{color:var(--muted);font-size:0.75rem}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:0.9rem;margin-bottom:3rem;animation:fadeUp 0.6s ease 1s both}
    .btn-primary{padding:1rem;border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;cursor:none;transition:all 0.3s ease;text-align:center;display:flex;align-items:center;justify-content:center}
    .btn-primary:hover{transform:translateY(-2px);filter:brightness(1.1)}
    .btn-secondary{padding:1rem;background:var(--bg2);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:'Syne',sans-serif;font-weight:600;font-size:0.95rem;cursor:none;transition:all 0.3s ease;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center}
    .btn-secondary:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-2px)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @media(hover:none){body{cursor:auto}.cursor,.cursor-follower{display:none}}
    @media(max-width:768px){.container{padding:1rem;max-width:100%}.score-hero{padding:1.8rem 1.2rem;border-radius:20px}.result-emoji{font-size:2.8rem}.score-ring{width:110px;height:110px}.score-pts{font-size:1.7rem}.recs-grid{grid-template-columns:1fr 1fr;gap:0.7rem}.actions{grid-template-columns:1fr;gap:0.7rem}.stat-val{font-size:1.5rem}}
    @media(max-width:480px){.recs-grid{grid-template-columns:1fr 1fr}.score-hero{padding:1.4rem 1rem}}
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="follower"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="confettiCanvas"></canvas>
<div class="container">
  <div class="topbar">
    <div class="logo">QuizVibe✦</div>
    <a href="index.html" class="back-link">← All topics</a>
  </div>
  <div class="score-hero" id="scoreHero">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-title" id="resultTitle">Amazing!</div>
    <div class="result-msg" id="resultMsg">You crushed it!</div>
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle class="ring-bg-r" cx="65" cy="65" r="55"/>
          <circle class="ring-fg-r" id="ringFg" cx="65" cy="65" r="55"/>
        </svg>
        <div class="score-inner">
          <span class="score-pts" id="scorePts">0</span>
          <span class="score-sub">points</span>
        </div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><span class="stat-val" id="statCorrect">0</span><span class="stat-lbl">Correct</span></div>
      <div class="stat-box"><span class="stat-val" id="statWrong">0</span><span class="stat-lbl">Wrong</span></div>
      <div class="stat-box"><span class="stat-val" id="statPct">0%</span><span class="stat-lbl">Accuracy</span></div>
    </div>
  </div>
  <div class="section-title">Try these next</div>
  <div class="recs-grid" id="recsGrid"></div>
  <div class="actions">
    <button class="btn-primary" id="retryBtn" onclick="retry()">↺ Play Again</button>
    <a href="index.html" class="btn-secondary">← All Topics</a>
  </div>
</div>
<script src="./data.js"></script>
<script>
  const cursor=document.getElementById('cursor');
  const follower=document.getElementById('follower');
  let mx=0,my=0,fx=0,fy=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx-6+'px';cursor.style.top=my-6+'px';});
  function animFollower(){fx+=(mx-fx)*0.15;fy+=(my-fy)*0.15;follower.style.left=fx-18+'px';follower.style.top=fy-18+'px';requestAnimationFrame(animFollower);}
  animFollower();

  const topicId=sessionStorage.getItem('selectedTopic')||'kpop';
  const difficulty=sessionStorage.getItem('difficulty')||'easy';
  const topic=quizData[topicId]||quizData['kpop'];
  const score=parseInt(sessionStorage.getItem('finalScore'))||0;
  const correct=parseInt(sessionStorage.getItem('correctCount'))||0;
  const wrong=15-correct;
  const pct=Math.round((correct/15)*100);

  const messages=[
    {min:0,max:3,emoji:'😅',title:'Keep Practicing!',msg:"Don't worry — every expert was a beginner once. Try again!"},
    {min:4,max:7,emoji:'🙂',title:'Not Bad!',msg:"You're getting there! A bit more practice and you'll nail it."},
    {min:8,max:10,emoji:'😎',title:'Pretty Good!',msg:'Solid effort! You clearly know your stuff on this topic.'},
    {min:11,max:12,emoji:'🔥',title:'On Fire!',msg:"Wow, you're really good at this! Almost a perfect score!"},
    {min:13,max:15,emoji:'🏆',title:'Legendary!',msg:'Perfect or near-perfect! You are an absolute master of this topic!'}
  ];
  const result=messages.find(m=>correct>=m.min&&correct<=m.max)||messages[0];

  document.getElementById('resultEmoji').textContent=result.emoji;
  document.getElementById('resultTitle').textContent=result.title;
  document.getElementById('resultMsg').textContent=result.msg;
  document.getElementById('statCorrect').textContent=correct;
  document.getElementById('statWrong').textContent=wrong;
  document.getElementById('statPct').textContent=pct+'%';
  document.getElementById('statCorrect').style.color=topic.color;
  document.getElementById('statPct').style.color=topic.color;

  const hero=document.getElementById('scoreHero');
  hero.style.borderColor=topic.color+'33';
  document.getElementById('ringFg').style.stroke=topic.color;
  document.getElementById('retryBtn').style.background=topic.bg;

  setTimeout(()=>{
    const offset=345*(1-pct/100);
    document.getElementById('ringFg').style.strokeDashoffset=offset;
  },100);

  let displayed=0;
  const counter=setInterval(()=>{
    displayed=Math.min(displayed+Math.ceil(score/40),score);
    document.getElementById('scorePts').textContent=displayed;
    if(displayed>=score)clearInterval(counter);
  },30);

  const others=Object.entries(quizData).filter(([k])=>k!==topicId).sort(()=>Math.random()-0.5).slice(0,4);
  const recsGrid=document.getElementById('recsGrid');
  others.forEach(([key,t],i)=>{
    const card=document.createElement('a');
    card.className='rec-card';
    card.href='#';
    card.style.animationDelay=(0.9+i*0.1)+'s';
    card.innerHTML=`<span class="rec-emoji">${t.emoji}</span><div class="rec-name">${t.name}</div><div class="rec-desc">${t.description}</div>`;
    card.addEventListener('mouseenter',()=>{card.style.borderColor=t.color+'44';});
    card.addEventListener('mouseleave',()=>{card.style.borderColor='';});
    card.onclick=e=>{e.preventDefault();sessionStorage.setItem('selectedTopic',key);window.location.href='quiz.html';};
    recsGrid.appendChild(card);
  });

  function retry(){window.location.href='quiz.html';}

  if(correct>=11){
    const canvas=document.getElementById('confettiCanvas');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    const colors=[topic.color,'#A78BFA','#60A5FA','#34D399','#FBBF24'];
    const particles=Array.from({length:120},()=>({
      x:Math.random()*canvas.width,y:-20,
      vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      size:Math.random()*8+4,rotation:Math.random()*360,rotSpeed:(Math.random()-0.5)*6
    }));
    let frame=0;
    function drawConfetti(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p=>{
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation*Math.PI/180);
        ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-frame/180);
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
        ctx.restore();
        p.x+=p.vx;p.y+=p.vy;p.rotation+=p.rotSpeed;p.vy+=0.06;
      });
      frame++;if(frame<200)requestAnimationFrame(drawConfetti);
    }
    setTimeout(drawConfetti,600);
  }
</script>
</body>
</html>
